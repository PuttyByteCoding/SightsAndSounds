services:
  postgres:
    image: postgres:16
    container_name: sights-and-sounds-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-videoorganizer}
      POSTGRES_USER: ${POSTGRES_USER:-postgresuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgresuser} -d $${POSTGRES_DB:-videoorganizer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # One-shot: ensure a dedicated `keycloak` database exists in the SAME Postgres
  # instance Sights & Sounds uses (#124, Deployment Option 2 + "reuse the app's
  # Postgres"). Postgres only runs /docker-entrypoint-initdb.d on a fresh volume,
  # and the app's volume already exists — so we create the DB idempotently here.
  # Runs to completion before Keycloak starts. Does not touch the app's data.
  keycloak-db-init:
    image: postgres:16
    container_name: sights-and-sounds-keycloak-db-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    entrypoint:
      - sh
      - -c
      - >
        psql -h postgres -U "${POSTGRES_USER:-postgresuser}" -d postgres -tc
        "SELECT 1 FROM pg_database WHERE datname='keycloak'" | grep -q 1 ||
        psql -h postgres -U "${POSTGRES_USER:-postgresuser}" -d postgres -c "CREATE DATABASE keycloak"
    restart: "no"

  # Keycloak identity provider (#124). Local/LAN dev: start-dev over HTTP, realm
  # imported from keycloak/realm-export.json, state persisted in the `keycloak`
  # database of the shared Postgres. Admin console: http://localhost:8080
  # (KC_ADMIN_USER / KC_ADMIN_PASSWORD).
  #
  # KC_HOSTNAME pins the *issuer* baked into minted tokens. Default "localhost"
  # matches the Auth:Authority default, so on-host login works out of the box.
  # For LAN access set KC_HOSTNAME to the host's LAN URL in .env (e.g.
  # http://192.168.4.38:8080 — or https://192.168.4.38:8443 with the TLS overlay)
  # so tokens carry a stable issuer the API can validate regardless of which
  # device reached Keycloak. Without this pin the issuer floats with the request
  # host and only the host itself (localhost) can authenticate (#221).
  # For HTTPS on Keycloak, layer docker-compose.tls.yml (see #222).
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.2
    container_name: sights-and-sounds-keycloak
    command: ["start-dev", "--import-realm"]
    depends_on:
      keycloak-db-init:
        condition: service_completed_successfully
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-postgresuser}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    restart: unless-stopped

  # Structured log viewer for development. The API ships logs here when
  # Logging:Seq:ServerUrl is set (configured in appsettings.Development.json).
  # UI + ingestion both live on http://localhost:5341.
  seq:
    image: datalust/seq:latest
    container_name: sights-and-sounds-seq
    environment:
      ACCEPT_EULA: "Y"
      # Dev-only sink — no auth wall in front of the local UI. Seq 2024+
      # refuses to start without either an admin password or this opt-out.
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
      # Allow the SvelteKit dev server (a different port on localhost) to
      # embed the Seq UI in an iframe on /logs. Default is `'none'`, which
      # blocks all embedding. `*` is fine here — the container only listens
      # on localhost.
      SEQ_API_FRAMEANCESTORS: "*"
    ports:
      - "5341:80"
    volumes:
      - seq_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  seq_data:
    driver: local
