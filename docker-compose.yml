services:
  postgres:
    image: postgres:16
    container_name: sights-and-sounds-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-videoorganizer}
      POSTGRES_USER: ${POSTGRES_USER:-postgresuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgresuser} -d $${POSTGRES_DB:-videoorganizer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
